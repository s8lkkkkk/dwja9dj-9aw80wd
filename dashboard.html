{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
  <h2 class="text-2xl font-bold mb-6">Dashboard</h2>

  <div class="bg-gray-800 p-6 rounded-lg shadow mb-6">
    <p class="text-gray-300 font-semibold">Total Events: <span class="text-white">{{ stats.total }}</span></p>
  </div>

  <div class="bg-gray-800 p-6 rounded-lg shadow">
    <h3 class="text-lg font-semibold mb-2">Top Paths</h3>
    <ul class="space-y-1">
      {% for path in stats.paths %}
        <li class="bg-gray-700 p-2 rounded hover:bg-gray-600">{{ path }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
